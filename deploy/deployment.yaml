apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectorctrl-operator
  namespace: collectorctrl
  labels:
    app.kubernetes.io/name: collectorctrl-operator
    app.kubernetes.io/instance: collectorctrl-operator
    app.kubernetes.io/version: "v1.0.0"
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: collectorctrl-operator
      app.kubernetes.io/instance: collectorctrl-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: collectorctrl-operator
        app.kubernetes.io/instance: collectorctrl-operator
    spec:
      serviceAccountName: collectorctrl-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
          image: "ghcr.io/rahulmhatre2505/collectorctrl-operator:v1.0.0"
          imagePullPolicy: Always
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: OPAMP_SERVER
              value: "wss://172.31.30.24:4320/v1/opamp"
            - name: OPAMP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: collectorctrl-auth
                  key: secret-key
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
