apiVersion: v1
kind: ServiceAccount
metadata:
  name: collectorctrl-operator
  namespace: collectorctrl
  labels:
    app.kubernetes.io/name: collectorctrl-operator
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collectorctrl-operator
  labels:
    app.kubernetes.io/name: collectorctrl-operator
    app.kubernetes.io/managed-by: kubectl
rules:
  # Core workloads
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps (write for emergency mode)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Pods and exec
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Nodes (for metadata enrichment)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # CRD management
  - apiGroups: ["collectorctrl.io"]
    resources: ["collectormonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["collectorctrl.io"]
    resources: ["collectormonitors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["collectorctrl.io"]
    resources: ["collectormonitors/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collectorctrl-operator
  labels:
    app.kubernetes.io/name: collectorctrl-operator
    app.kubernetes.io/managed-by: kubectl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collectorctrl-operator
subjects:
  - kind: ServiceAccount
    name: collectorctrl-operator
    namespace: collectorctrl
