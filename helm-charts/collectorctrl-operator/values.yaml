replicaCount: 1

image:
  repository: ghcr.io/collectorctrl/operator
  pullPolicy: IfNotPresent
  tag: "v1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# OpAMP Server connection settings
opamp:
  server: "wss://collectorctrl.corp.internal:4320/v1/opamp"
  # Reference to an existing secret containing the auth key
  # The secret must have a key named "secret-key"
  existingSecret: ""
  # If existingSecret is not set, provide the secret key directly (not recommended for production)
  secretKey: ""

# RBAC scope: true = cluster-wide (can manage collectors in any namespace)
# false = namespace-scoped only
rbac:
  clusterScoped: true

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Pod scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 65532
  runAsGroup: 65532

# Health probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Prometheus Operator ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Leader election (recommended for HA, requires replicaCount > 1)
leaderElection:
  enabled: false
